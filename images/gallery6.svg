<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1035"/>
      <stop offset="55%" stop-color="#3a1f4e"/>
      <stop offset="100%" stop-color="#4a1f0e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffe08a" stop-opacity="0.6"/>
      <stop offset="55%" stop-color="#ffb347" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffb347" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="trophyGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff3b0"/>
      <stop offset="45%" stop-color="#f5c518"/>
      <stop offset="100%" stop-color="#c98a12"/>
    </linearGradient>
    <linearGradient id="confettiA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59f00"/>
      <stop offset="100%" stop-color="#e8590c"/>
    </linearGradient>
    <linearGradient id="podiumGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a3f2c"/>
      <stop offset="100%" stop-color="#3d2b1f"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bg2)"/>
  <rect width="800" height="600" fill="url(#glow)"/>

  <!-- Rays -->
  <g opacity="0.10">
    <polygon points="400,60 460,60 560,320 420,320" fill="#ffe08a"/>
    <polygon points="400,60 340,60 240,320 380,320" fill="#ffe08a"/>
  </g>

  <!-- Floor -->
  <rect x="0" y="480" width="800" height="120" fill="#0a0416"/>
  <ellipse cx="400" cy="482" rx="380" ry="14" fill="#000000" opacity="0.35"/>

  <!-- Big central trophy -->
  <g transform="translate(400,300)">
    <!-- base -->
    <rect x="-45" y="150" width="90" height="18" rx="3" fill="url(#trophyGold)"/>
    <rect x="-28" y="130" width="56" height="24" fill="url(#trophyGold)"/>
    <!-- stem -->
    <rect x="-8" y="90" width="16" height="45" fill="url(#trophyGold)"/>
    <!-- cup -->
    <path d="M-55 0 Q-55 70 0 90 Q55 70 55 0 L45 0 Q45 55 0 70 Q-45 55 -45 0 Z" fill="url(#trophyGold)"/>
    <path d="M-45 0 L45 0 L40 -55 Q0 -70 -40 -55 Z" fill="url(#trophyGold)"/>
    <!-- handles -->
    <path d="M-55 5 Q-90 5 -85 45 Q-82 65 -55 60" stroke="url(#trophyGold)" stroke-width="10" fill="none"/>
    <path d="M55 5 Q90 5 85 45 Q82 65 55 60" stroke="url(#trophyGold)" stroke-width="10" fill="none"/>
    <!-- star -->
    <polygon points="0,-40 8,-18 32,-18 13,-4 20,20 0,6 -20,20 -13,-4 -32,-18 -8,-18"
      fill="#fff3b0" stroke="#c98a12" stroke-width="1.5"/>
  </g>

  <!-- Podium 1-2-3 -->
  <g>
    <!-- 2nd -->
    <rect x="230" y="470" width="90" height="70" fill="url(#podiumGrad)"/>
    <text x="275" y="515" text-anchor="middle" font-family="Georgia, serif" font-size="30" fill="#f5c518" font-weight="bold">2</text>
    <!-- 1st -->
    <rect x="355" y="440" width="90" height="100" fill="url(#podiumGrad)"/>
    <text x="400" y="500" text-anchor="middle" font-family="Georgia, serif" font-size="34" fill="#fff3b0" font-weight="bold">1</text>
    <!-- 3rd -->
    <rect x="480" y="490" width="90" height="50" fill="url(#podiumGrad)"/>
    <text x="525" y="525" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#e8590c" font-weight="bold">3</text>
  </g>

  <!-- Small silhouettes cheering, on podiums -->
  <g fill="#0a0612">
    <path d="M255 470 L255 425 Q275 400 295 425 L295 470 Z"/>
    <circle cx="275" cy="412" r="14"/>
    <path d="M380 440 L380 390 Q400 362 420 390 L420 440 Z"/>
    <circle cx="400" cy="376" r="15"/>
    <path d="M505 490 L505 450 Q525 428 545 450 L545 490 Z"/>
    <circle cx="525" cy="438" r="13"/>
  </g>

  <!-- Confetti -->
  <g>
    <rect x="120" y="90" width="10" height="10" fill="url(#confettiA)" transform="rotate(20 125 95)"/>
    <rect x="660" y="120" width="10" height="10" fill="#f5c518" transform="rotate(-15 665 125)"/>
    <circle cx="160" cy="180" r="6" fill="#e8590c"/>
    <circle cx="640" cy="200" r="6" fill="#f5c518"/>
    <rect x="200" y="140" width="8" height="8" fill="#fff3b0" transform="rotate(35 204 144)"/>
    <rect x="600" y="150" width="8" height="8" fill="#e8590c" transform="rotate(-25 604 154)"/>
    <circle cx="100" cy="260" r="5" fill="#f5c518"/>
    <circle cx="700" cy="270" r="5" fill="#fff3b0"/>
    <rect x="140" y="330" width="9" height="9" fill="#e8590c" transform="rotate(10 144 334)"/>
    <rect x="650" y="340" width="9" height="9" fill="#f5c518" transform="rotate(-10 654 344)"/>
  </g>

  <!-- Audience silhouettes foreground -->
  <g fill="#05030a">
    <path d="M30 600 L30 545 Q50 515 70 545 L70 600 Z"/>
    <path d="M730 600 L730 545 Q750 515 770 545 L770 600 Z"/>
  </g>

  <text x="400" y="580" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#fff3b0" font-weight="600" letter-spacing="2">REMISE DES PRIX — AfriConnect</text>
</svg>
